# 閉環：lint → 單元測試 → demo 建置 → Playwright 煙霧（`PW_PREVIEW_ONLY` 不重複 vite build）。
# 可選登入 E2E（`npm run test:e2e:auth`）需 E2E_AUTH_*，預設於本機／有密鑰之 pipeline 執行。
# 本 job 之分步指令集合等同 **`npm run ci`**（`package.json`），僅拆成多個 step 以利 Actions 快取與日誌分段。
# 文件入口：`docs/business-logic.md` §0、專案根 `.cursorrules` §3、`README.md`、`docs/pdf-sequenced-gap-checklist.md` 主檔「運維與工程」列、`docs/pdf-sequenced-gap-checklist-revision-log.md`（日誌；歸檔見 `pdf-sequenced-gap-checklist-revision-log-2026-05-01a.md`、`pdf-sequenced-gap-checklist-revision-log-archive-p2.md`）、`docs/feature-list.md` §8；`docs/phase*.md`／`stage*.md` 開首對照互鏈該「運維與工程」列。
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 不放 `cache: npm`：還原之 cache 曾與 `npm ci` 交互導致裝依賴步驟全滅（後續 step 全 skipped）；嚴格 ci 仍靠 lockfile。
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 嚴格 `npm ci`（與 lockfile 一致）；若 registry 瞬断可重試。勿改回 `npm install` 以免與 lock 漂移。
      # `@playwright/test` 的 install hook 會下載瀏覽器：於此前先略過，改由下方「Install Playwright Chromium」統一下載，以免 `npm ci` 在 runner 逾時或失敗。
      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          set -euo pipefail
          node -v
          npm -v
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          ok=0
          for attempt in 1 2 3 4; do
            if npm ci --no-audit --no-fund; then
              ok=1
              break
            fi
            echo "::warning::npm ci 失敗（第 ${attempt}／4 次），20s 後重試"
            [ "$attempt" -lt 4 ] && sleep 20
          done
          [ "$ok" -eq 1 ]

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Demo production build（與 E2E 同源：`npm run build:demo`）
        run: npm run build:demo

      - name: Playwright smoke（PW_PREVIEW_ONLY，僅啟動 preview）
        run: npm run test:e2e
        env:
          PW_PREVIEW_ONLY: '1'
          VITE_SUPABASE_URL: ''
          VITE_SUPABASE_ANON_KEY: ''
