# 閉環：lint → 單元測試 → demo 建置 → Playwright 煙霧（`PW_PREVIEW_ONLY` 不重複 vite build）。
# 可選登入 E2E（`npm run test:e2e:auth`）需 E2E_AUTH_*，預設於本機／有密鑰之 pipeline 執行。
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Demo production build (與 Playwright webServer 同源：清空 VITE_SUPABASE_*)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ''
          VITE_SUPABASE_ANON_KEY: ''

      - name: Playwright smoke（PW_PREVIEW_ONLY，僅啟動 preview）
        run: npm run test:e2e
        env:
          PW_PREVIEW_ONLY: '1'
          VITE_SUPABASE_URL: ''
          VITE_SUPABASE_ANON_KEY: ''
