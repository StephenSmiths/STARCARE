# 閉環：lint → 單元測試 → demo 建置 → **`perf:bundle:ci`**（budget／diff／delta／history）→ Playwright 全套（`PW_PREVIEW_ONLY`）→ **`e2e/list-section-collapse.spec.ts`**（與 **`npm run test:e2e:list-ui`** 同源，不重複 vite build）。
# 可選登入 E2E（`npm run test:e2e:auth`）需 E2E_AUTH_*，預設於本機／有密鑰之 pipeline 執行。
# 本 job 之分步指令集合等同 **`npm run ci`**（`package.json`；已含 **`perf:bundle:ci`** 與 list UI 專檔），僅拆成多個 step 以利 Actions 快取與日誌分段。
# 文件入口：`docs/business-logic.md` §0（全案收尾執行併述 README 表前互鏈指引（含各檔對照／全案收尾母索引））、專案根 `.cursorrules` §3、`README.md`（「專案收尾」與 `docs/project-completion-*.md`）、`docs/evidence/gate-a-latest.md`（檔內 Next Command 與 preflight strict 並列；`npm run gatea:evidence:list`；取證前嚴格檢查 `npm run gatea:evidence:preflight:strict`；檔尾 blockquote 四行 `gateALatestMarkdownFooterLines`，見 `docs/gate-a-status-2026-05-06-commands-appendix.md#gate-a-appendix-latest-segment` 下文 latest 段）、`docs/gate-a-manual-evidence-checklist-2026-05-06.md`（人工 strict-http／`--keep=1`；與 `docs/go-live-checklist.md` §0.1 併讀）、`docs/pdf-sequenced-gap-checklist.md` 主檔「運維與工程」列與開首全案收尾句、`docs/pdf-sequenced-gap-checklist-revision-log.md`（日誌；歸檔見 `pdf-sequenced-gap-checklist-revision-log-2026-05-01a.md`、`pdf-sequenced-gap-checklist-revision-log-archive-p2.md`、`pdf-sequenced-gap-checklist-revision-log-archive-p3.md`、`pdf-sequenced-gap-checklist-revision-log-archive-p4.md`）、`docs/go-live-checklist.md`、`docs/supabase-deploy-runbook.md`、`docs/security-token-rotation-checklist.md`、`docs/feature-list.md` §8；`docs/phase*.md`／`stage*.md`／`docs/seq*.md` 開首對照互鏈該「運維與工程」列。
# Seq 29【16】系統設定（Playwright）：`npm run ci` 內 `test:e2e` 含 `e2e/smoke.spec.ts` 之 `#system-settings`（`build:demo` 清空 `VITE_SUPABASE_*`）。專項 `npm run test:e2e:system-settings-policy` 與 UAT **二之一**（段末 **工程維護互鏈**）對照見 `docs/uat/system-settings-policy-p1-uat-and-staging-2026-05-09.md`、`docs/seq29-system-settings-pdf02-traceability.md` 第 4 節、`docs/seq29-system-settings-pdf02-traceability-revision-log.md`（與上列「文件入口」、`docs/pdf03-cursorrules-alignment.md` §3 並讀）。**P2** 標題：**Vitest** **`SystemSettingsHome.policyP2Titles.test.tsx`**；可選 **`npm run test:e2e:auth`** 內 **`e2e/auth-login.system-settings-p2.spec.ts`**（**`E2E_AUTH_TEAMLEAD_*`** 優先／**`E2E_AUTH_ADMIN_*`**＋保留 **`VITE_*`** 建置；見 **`playwright.auth.config.ts`**）；Staging 手動見 UAT **二之二**。
# Gate A：多數 `npm run gatea:evidence:*` 終端 stdout `gateAStandardCloseoutBlockquotes` 兩行（`scripts/gate-a-markdown-footer.mjs` Export 契約；第二行併人工／strict-http／keep=1）；README「Gate A 終端頁尾（維護）」、`docs/go-live-checklist.md` §0.1、`docs/gate-a-manual-evidence-checklist-2026-05-06.md` 開首。
name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main, master, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      allow_npm_install_fallback:
        description: '允許 npm ci 失敗後回退 npm install（僅手動止血）'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 不放 `cache: npm`：還原之 cache 曾與 `npm ci` 交互導致裝依賴步驟全滅（後續 step 全 skipped）；嚴格 ci 仍靠 lockfile。
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 止血策略：優先嚴格 `npm ci`（與 lockfile 一致），若 runner 上連續失敗再暫時回退 `npm install`，先避免全流程被卡住。
      # `@playwright/test` 的 install hook 會下載瀏覽器：於此前先略過，改由下方「Install Playwright Chromium」統一下載。
      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          ALLOW_NPM_INSTALL_FALLBACK: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.allow_npm_install_fallback == 'true') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          set -euo pipefail
          mkdir -p .ci-logs
          node -v
          npm -v
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          ok=0
          for attempt in 1 2 3 4; do
            if npm ci --no-audit --no-fund >".ci-logs/npm-ci-attempt-${attempt}.log" 2>&1; then
              echo "npm ci success at attempt ${attempt}"
              ok=1
              break
            fi
            echo "::warning::npm ci 失敗（第 ${attempt}／4 次），20s 後重試"
            echo "---- npm ci attempt ${attempt} tail ----"
            tail -n 60 ".ci-logs/npm-ci-attempt-${attempt}.log" || true
            [ "$attempt" -lt 4 ] && sleep 20
          done
          if [ "$ok" -ne 1 ]; then
            if [ "${ALLOW_NPM_INSTALL_FALLBACK}" = "true" ]; then
              echo "::warning::npm ci 連續失敗，依事件策略回退 npm install（workflow_dispatch 或 main push）。"
              npm install --no-audit --no-fund > .ci-logs/npm-install-fallback.log 2>&1
              echo "---- npm install fallback tail ----"
              tail -n 60 .ci-logs/npm-install-fallback.log || true
            else
              echo "::error::npm ci 連續失敗，且未允許 fallback；請檢查上方 npm ci tail log。"
              exit 1
            fi
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Demo production build（與 E2E 同源：`npm run build:demo`）
        run: npm run build:demo

      - name: Bundle governance checks（budget + diff + delta + history）
        run: env -u npm_config_devdir npm run perf:bundle:ci

      - name: Bundle CI summary markdown
        if: always()
        run: |
          env -u npm_config_devdir npm run perf:bundle:ci:summary || true
          cat dist/bundle-ci-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bundle report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: |
            dist/bundle-report.json
            dist/bundle-diff.md
            dist/bundle-delta.json
            dist/bundle-history.md
            dist/bundle-ci-summary.md

      - name: Playwright smoke（PW_PREVIEW_ONLY，僅啟動 preview）
        run: npm run test:e2e
        env:
          PW_PREVIEW_ONLY: '1'
          VITE_SUPABASE_URL: ''
          VITE_SUPABASE_ANON_KEY: ''

      - name: Playwright list UI collapse（清單頁預設收合規格）
        run: npm run test:e2e:list-ui
